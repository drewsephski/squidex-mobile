name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "scripts/**"
      - ".github/workflows/build-apk.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Generate release keystore
        run: |
          mkdir -p apps/mobile/android/keystores
          keytool -genkey -v -keystore apps/mobile/android/keystores/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass squidexci -keypass squidexci \
            -dname "CN=Squidex, OU=CI, O=Squidex, L=Unknown, ST=Unknown, C=US"

      - name: Build unsigned APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Sign APK with apksigner
        run: |
          APK=apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=apps/mobile/android/app/build/outputs/apk/release/app-release.apk

          # If Gradle already produced app-release.apk, use that; otherwise use -unsigned
          if [ ! -f "$APK" ]; then
            APK="$SIGNED"
          fi

          echo "Signing: $APK"
          ls -la "$APK"

          # Find apksigner in the Android SDK
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name apksigner -type f 2>/dev/null | head -1)
          if [ -z "$APKSIGNER" ]; then
            # Try ANDROID_HOME
            APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APKSIGNER" ]; then
            echo "ERROR: apksigner not found!"
            ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "No build-tools"
            exit 1
          fi
          echo "Found apksigner: $APKSIGNER"

          # Sign the APK
          "$APKSIGNER" sign \
            --ks apps/mobile/android/keystores/release.keystore \
            --ks-pass pass:squidexci \
            --ks-key-alias release \
            --key-pass pass:squidexci \
            --out "$SIGNED" \
            "$APK"

          # Verify the signature
          echo "=== Signature verification ==="
          "$APKSIGNER" verify --verbose "$SIGNED" 2>&1

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          mkdir -p dist
          APK=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          cp "$APK" "dist/squidex.apk"
          cp "$APK" "dist/squidex-${VERSION}-${SHA}.apk"
          echo "APK size: $(ls -lh dist/squidex.apk | awk '{print $5}')"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: squidex-apk
          path: dist/*.apk
          retention-days: 90

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)

          gh release delete latest --yes 2>/dev/null || true

          gh release create latest \
            --title "Latest build ($VERSION - $SHA)" \
            --notes "Automated APK build from commit ${{ github.sha }}." \
            --latest \
            dist/squidex.apk
