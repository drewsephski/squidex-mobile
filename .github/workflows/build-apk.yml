name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name for this build"
        required: false
        default: ""

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: |
          cd apps/mobile
          npx expo build:android --type apk --output-dir ../../dist

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          SHA=$(git rev-parse --short HEAD)
          mv dist/*.apk "dist/squidex-${VERSION}-${SHA}.apk" 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: squidex-apk
          path: dist/*.apk
          retention-days: 30
