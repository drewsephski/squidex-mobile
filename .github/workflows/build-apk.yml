name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Generate keystore and signing config
        run: |
          mkdir -p apps/mobile/android/keystores

          # Generate a release keystore for CI signing
          keytool -genkey -v -keystore apps/mobile/android/keystores/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass squidexci -keypass squidexci \
            -dname "CN=Squidex, OU=CI, O=Squidex, L=Unknown, ST=Unknown, C=US"

          # Create credentials.json for the eas-build.gradle signing config
          cat > apps/mobile/credentials.json << 'EOF'
          {
            "android": {
              "keystore": {
                "keystorePath": "android/keystores/release.keystore",
                "keystorePassword": "squidexci",
                "keyAlias": "release",
                "keyPassword": "squidexci"
              }
            }
          }
          EOF

      - name: Build signed APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Verify APK is signed
        run: |
          echo "=== APK signature verification ==="
          apksigner verify --verbose apps/mobile/android/app/build/outputs/apk/release/app-release.apk 2>&1 || echo "WARNING: APK may not be properly signed"

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          mkdir -p dist
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk "dist/squidex.apk"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk "dist/squidex-${VERSION}-${SHA}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: squidex-apk
          path: dist/*.apk
          retention-days: 90

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)

          # Delete existing "latest" release if it exists
          gh release delete latest --yes 2>/dev/null || true

          # Create new "latest" release
          gh release create latest \
            --title "Latest build ($VERSION - $SHA)" \
            --notes "Automated APK build from commit ${{ github.sha }}." \
            --latest \
            dist/squidex.apk
