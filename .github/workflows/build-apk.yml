name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          mkdir -p dist
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk "dist/squidex.apk"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk "dist/squidex-${VERSION}-${SHA}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: squidex-apk
          path: dist/*.apk
          retention-days: 90

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)

          # Delete existing "latest" release if it exists
          gh release delete latest --yes 2>/dev/null || true

          # Create new "latest" release
          gh release create latest \
            --title "Latest build ($VERSION - $SHA)" \
            --notes "Automated APK build from commit ${{ github.sha }}." \
            --latest \
            dist/squidex.apk
