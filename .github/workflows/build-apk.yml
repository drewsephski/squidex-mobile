name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "scripts/**"
      - ".github/workflows/build-apk.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Generate keystore and signing config
        run: |
          # Create keystore directory
          mkdir -p apps/mobile/android/keystores

          # Generate a release keystore used for signing
          keytool -genkey -v -keystore apps/mobile/android/keystores/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass squidexci -keypass squidexci \
            -dname "CN=Squidex, OU=CI, O=Squidex, L=Unknown, ST=Unknown, C=US"

          # Create credentials.json for the eas-build.gradle signing hook
          # (expo prebuild generates a gradle file that reads this)
          cat > apps/mobile/credentials.json << 'EOF'
          {
            "android": {
              "keystore": {
                "keystorePath": "android/keystores/release.keystore",
                "keystorePassword": "squidexci",
                "keyAlias": "release",
                "keyPassword": "squidexci"
              }
            }
          }
          EOF

      - name: Build APK with Gradle
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Sign and verify APK
        run: |
          KEYSTORE=apps/mobile/android/keystores/release.keystore
          INPUT_APK=apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          OUTPUT_APK=apps/mobile/android/app/build/outputs/apk/release/app-release.apk

          # Gradle may produce -unsigned or signed depending on build config
          if [ ! -f "$INPUT_APK" ]; then
            INPUT_APK="$OUTPUT_APK"
          fi

          echo "Input APK: $INPUT_APK"
          ls -la "$INPUT_APK"

          # Locate apksigner in Android SDK
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name apksigner -type f 2>/dev/null | head -1)
          echo "apksigner: $APKSIGNER"

          # Sign the APK
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-pass pass:squidexci \
            --ks-key-alias release \
            --key-pass pass:squidexci \
            --out "$OUTPUT_APK" \
            "$INPUT_APK"

          # Verify signature
          echo "=== SIGNATURE VERIFICATION ==="
          "$APKSIGNER" verify --verbose "$OUTPUT_APK" 2>&1

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          mkdir -p dist
          APK=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          cp "$APK" "dist/squidex.apk"
          cp "$APK" "dist/squidex-${VERSION}-${SHA}.apk"
          echo "APK size: $(ls -lh dist/squidex.apk | awk '{print $5}')"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: squidex-apk
          path: dist/*.apk
          retention-days: 90

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)

          gh release delete latest --yes 2>/dev/null || true

          gh release create latest \
            --title "Latest build ($VERSION - $SHA)" \
            --notes "Automated APK build from commit ${{ github.sha }}." \
            --latest \
            dist/squidex.apk
